{% extends 'base.html' %}

{% block title %}
    فراموشی رمز عبور
{% endblock %}

{% block content %}
    <div class="container">
        <section id="form">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">

                    <div class="signup-form shadow-lg p-4 rounded-3 bg-white">
                        <h3 class="text-center mb-4">فراموشی رمز عبور</h3>

                        <form method="post" action="{% url 'forgot_password_page' %}">
                            {% csrf_token %}

                            <div class="form-group mb-3">
                                <label>ایمیل</label>
                                {{ forgot_password_form.email }}
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                بعدی>
                            </button>

                        </form>
                    </div>

                </div>
            </div>
        </section>
    </div>
    <br>
{% endblock %}
