{% extends 'base.html' %}

{% block title %}
    ثبت نام
{% endblock %}

{% block content %}
    <div class="container">
        <section id="form">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">

                    <div class="signup-form shadow-lg p-4 rounded-3 bg-white">
                        <h3 class="text-center mb-4">ثبت نام کاربر جدید</h3>

                        <form method="post" action="{% url 'register_page' %}">
                            {% csrf_token %}

                            <div class="form-group mb-3">
                                <label>نام</label>
                                {{ register_form.first_name }}
                            </div>

                            <div class="form-group mb-3">
                                <label>نام خانوادگی</label>
                                {{ register_form.last_name }}
                            </div>

                            <div class="form-group mb-3">
                                <label>ایمیل</label>
                                {{ register_form.email }}
                            </div>

                            <div class="form-group mb-3">
                                <label>رمز عبور</label>
                                {{ register_form.password }}
                            </div>

                            <div class="form-group mb-4">
                                <label>تکرار رمز عبور</label>
                                {{ register_form.confirm_password }}
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                ثبت نام
                            </button>

                        </form>
                    </div>

                </div>
            </div>
        </section>
    </div>
    <br>
{% endblock %}
